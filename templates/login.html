<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Cam AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

    <div class="glass-card login-card">
        <div class="logo-container">
            <div class="logo-circle">
                <i class="fas fa-robot"></i>
            </div>
            <h1 style="margin-top: 1rem; font-size: 1.75rem;">Smart Cam AI</h1>
            <p style="color: var(--text-dim); font-size: 0.9rem;">Intelligence at your fingertips</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-dim);"></i>
                    <input type="text" id="username" name="username" style="padding-left: 2.75rem; width: 100%;" placeholder="Enter admin" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-dim);"></i>
                    <input type="password" id="password" name="password" style="padding-left: 2.75rem; width: 100%;" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 3.25rem;">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        {% if error %}
        <div style="margin-top: 1.5rem; color: #ef4444; font-size: 0.85rem; background: rgba(239, 68, 68, 0.1); padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2);">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <div style="margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <p style="font-size: 0.75rem; color: var(--text-dim);">
                Secure Access • Version 3.0.4
            </p>
        </div>
    </div>

</body>
</html>
